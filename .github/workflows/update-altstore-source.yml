name: Update AltStore Source

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing GitHub Release tag to publish to AltStore. Leave empty to use the latest published release.
        required: false
        type: string

permissions:
  contents: write

jobs:
  update-source:
    name: Update AltStore Source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Get Release Info
        id: release_info
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_EVENT_TAG: ${{ github.event.release.tag_name }}
          WORKFLOW_INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail

          TAG="${RELEASE_EVENT_TAG:-${WORKFLOW_INPUT_TAG:-}}"
          if [ -z "$TAG" ]; then
            TAG="$(gh release list --exclude-drafts --limit 1 --json tagName --jq '.[0].tagName // ""')"
          fi

          if [ -z "$TAG" ]; then
            echo "::error::No published release tag found. Publish a GitHub Release first, then rerun this workflow."
            exit 1
          fi

          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"

          if ! RELEASE_JSON=$(gh release view "$TAG" --json assets,publishedAt,body 2>/tmp/gh-release-error.log); then
            echo "::error::Release $TAG was not found. Create the release first, then rerun this workflow with that tag."
            cat /tmp/gh-release-error.log
            exit 1
          fi

          IPA_URL=$(echo "$RELEASE_JSON" | jq -r 'first(.assets[] | select(.name | test("ios.*\\.ipa$"; "i")) | (.browserDownloadUrl // .url // empty)) // empty')
          IPA_SIZE=$(echo "$RELEASE_JSON" | jq -r 'first(.assets[] | select(.name | test("ios.*\\.ipa$"; "i")) | .size) // empty')
          RELEASE_DATE=$(echo "$RELEASE_JSON" | jq -r '(.publishedAt // "") | split("T")[0]')
          RELEASE_NOTES=$(echo "$RELEASE_JSON" | jq -r '.body // ""')
          RELEASE_NOTES="${RELEASE_NOTES:0:500}"

          if [ -z "$IPA_URL" ] || [ "$IPA_URL" = "null" ]; then
            echo "No IPA found in release $TAG"
            exit 1
          fi

          echo "IPA_URL=$IPA_URL" >> "$GITHUB_OUTPUT"
          echo "IPA_SIZE=${IPA_SIZE:-50000000}" >> "$GITHUB_OUTPUT"
          echo "RELEASE_DATE=$RELEASE_DATE" >> "$GITHUB_OUTPUT"
          # Use EOF delimiter for multiline
          {
            echo "RELEASE_NOTES<<NOTES_EOF"
            echo "$RELEASE_NOTES"
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Update AltStore Source JSON
        env:
          VERSION: ${{ steps.release_info.outputs.VERSION }}
          IPA_URL: ${{ steps.release_info.outputs.IPA_URL }}
          IPA_SIZE: ${{ steps.release_info.outputs.IPA_SIZE }}
          RELEASE_DATE: ${{ steps.release_info.outputs.RELEASE_DATE }}
          RELEASE_NOTES: ${{ steps.release_info.outputs.RELEASE_NOTES }}
        run: |
          # Build the new version entry
          NEW_VERSION=$(jq -n \
            --arg version "$VERSION" \
            --arg date "$RELEASE_DATE" \
            --argjson size "${IPA_SIZE}" \
            --arg url "$IPA_URL" \
            --arg desc "$RELEASE_NOTES" \
            '{
              version: $version,
              date: $date,
              size: $size,
              downloadURL: $url,
              localizedDescription: $desc
            }')

          # Update the source JSON:
          # - Prepend new version to the versions array (keep last 5)
          # - Remove any existing entry with the same version number
          jq --argjson newVer "$NEW_VERSION" \
            --arg ver "$VERSION" \
            '
            .apps[0].versions = (
              [$newVer] + [.apps[0].versions[] | select(.version != $ver)]
              | .[0:5]
            )
            ' altstore-source.json > altstore-source-tmp.json

          mv altstore-source-tmp.json altstore-source.json

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add altstore-source.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update AltStore source for ${{ steps.release_info.outputs.TAG }}"
            git push
          fi
